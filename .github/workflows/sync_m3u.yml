# 工作流名称：同步内容到 index.php
name: 同步内容到 index.php

# 触发条件：手动触发 + 定时（每15分钟执行一次）
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  sync-file:
    runs-on: ubuntu-latest
    # 全局写入权限
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # 强制注入token用于推送
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 执行同步脚本
        run: |
          # 配置区
          BACKUP_URL="https://ghproxy.com/https://pastecode.dev/raw/2i9vtj9l/paste1.txt"
          MAIN_URL="https://ghproxy.com/https://github.com/ioptu/migu_video/raw/refs/heads/main/migu.m3u"
          FIXED_SOURCE_URL1="https://pastecode.dev/raw/eq5q34ns/%E5%9B%BA%E5%AE%9A"
          FIXED1_SWITCH="off"
          FIXED_SOURCE_URL2="https://pastecode.dev/raw/xxxx/xxxx"
          FIXED2_SWITCH="off"
          FIXED_SOURCE_URL3="https://pastecode.dev/raw/xxxx/xxxx"
          FIXED3_SWITCH="off"
          FIXED_SOURCE_URL4="https://pastecode.dev/raw/xxxx/xxxx"
          FIXED4_SWITCH="off"
          EXPIRE_DATETIME="2026-07-01 00:00:00"
          TASK_FLAG="expire_task_done.flag"
          GROUP_NAME="央视直播"
          GROUP_SWITCH="on"
          CURL_OPT="--connect-timeout 5 --max-time 15 --retry 2 --retry-delay 2 -L -s"

          export TZ=Asia/Shanghai
          NOW_DATETIME=$(date "+%Y-%m-%d %H:%M:%S")

          # 到期逻辑
          if [[ "$NOW_DATETIME" > "$EXPIRE_DATETIME" ]]; then
            TARGET_URL="$BACKUP_URL"
            [ ! -f "$TASK_FLAG" ] && touch "$TASK_FLAG"
            LOAD_FIXED_SOURCE="off"
          else
            TARGET_URL="$MAIN_URL"
            rm -f "$TASK_FLAG"
            LOAD_FIXED_SOURCE="on"
          fi

          > index.php

          # 固定源1
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED1_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix1 "$FIXED_SOURCE_URL1"
            sed "s/group-title=\"[^\"]*\"/group-title=\"${GROUP_NAME}\"/g" temp_fix1 >> index.php
            rm -f temp_fix1
          fi

          # 主源（第二位）
          curl $CURL_OPT -o temp_source "$TARGET_URL"
          if [[ "$GROUP_SWITCH" == "on" ]]; then
            sed "s/group-title=\"[^\"]*\"/group-title=\"${GROUP_NAME}\"/g" temp_source >> index.php
          else
            cat temp_source >> index.php
          fi
          rm -f temp_source

          # 剩余固定源
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED2_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix2 "$FIXED_SOURCE_URL2"
            sed "s/group-title=\"[^\"]*\"/group-title=\"${GROUP_NAME}\"/g" temp_fix2 >> index.php
            rm -f temp_fix2
          fi
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED3_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix3 "$FIXED_SOURCE_URL3"
            sed "s/group-title=\"[^\"]*\"/group-title=\"${GROUP_NAME}\"/g" temp_fix3 >> index.php
            rm -f temp_fix3
          fi
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED4_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix4 "$FIXED_SOURCE_URL4"
            sed "s/group-title=\"[^\"]*\"/group-title=\"${GROUP_NAME}\"/g" temp_fix4 >> index.php
            rm -f temp_fix4
          fi
          rm -f temp_*

      # 【重写推送代码，解决403静默失败】
      - name: 提交并强制推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add index.php
          # 强制提交，即使内容无变化也生成提交（杜绝不推送）
          git commit --allow-empty -m "自动更新直播源"
          git pull --rebase origin main
          git push origin main

      # 企业微信通知
      - name: 企业微信同步通知
        if: always()
        run: |
          set +e
          WEBHOOK="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=b581707c-2415-4b9e-958e-9d0f8fdba1cb"
          export TZ=Asia/Shanghai
          RUN_TIME=$(date "+%Y-%m-%d %H:%M:%S")
          EXPIRE_TIME="2026-07-01 00:00:00"
          ADVANCE_REMIND_DAYS=30
          FILE_LINK="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/index.php"

          if git diff --quiet HEAD~1 HEAD -- index.php; then
            CHANGE="本次文件无内容变更，属于正常状态，非故障"
          else
            CHANGE="已成功更新直播源文件内容"
          fi

          EXPIRE_TIMESTAMP=$(date -d "$EXPIRE_TIME" +%s)
          NOW_TIMESTAMP=$(date -d "$RUN_TIME" +%s)
          DIFF_DAYS=$(( (EXPIRE_TIMESTAMP - NOW_TIMESTAMP) / 86400 ))

          if [[ $DIFF_DAYS -le 0 ]]; then
            EXPIRE_TIP="到期提示：直播源已到期，仅加载备用源，请及时续费"
          elif [[ $DIFF_DAYS -le $ADVANCE_REMIND_DAYS ]]; then
            EXPIRE_TIP="到期提醒：距离到期剩余 ${DIFF_DAYS} 天"
          else
            EXPIRE_TIP=""
          fi

          MSG="直播源自动同步任务报告
====================================
执行时间：$RUN_TIME
运行状态：${{ job.status }}
文件变更：$CHANGE
到期截止：$EXPIRE_TIME
统一分组：${GROUP_NAME}
------------------------------------
自动周期：每15分钟执行一次
====================================
$EXPIRE_TIP"

          if [[ "${{ job.status }}" == "failure" ]]; then
            MSG="$MSG
@all"
          fi

          curl --connect-timeout 10 --max-time 20 -H "Content-Type: application/json;charset=utf-8" -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MSG\"}}" "$WEBHOOK"
