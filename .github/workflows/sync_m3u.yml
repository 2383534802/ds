# 工作流名称：同步内容到 indx.php
name: 同步内容到 indx.php

# 触发条件：手动触发 + 每30分钟定时
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

# 定义作业
jobs:
  sync-file:
    # GitHub 标准运行环境
    runs-on: ubuntu-latest
    # 最大执行超时（GitHub 支持，Forgejo不支持，此处恢复）
    timeout-minutes: 10

    steps:
      # 步骤1：检出仓库代码
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      # 步骤2：核心同步脚本（完整保留原有逻辑，适配Ubuntu bash）
      - name: 核心同步脚本
        run: |
          # 自定义配置变量区
          BACKUP_URL="https://pastecode.dev/raw/2i9vtj9l/paste1.txt"
          MAIN_URL="https://gh-proxy.org/github.com/ioptu/migu_video/raw/refs/heads/main/migu.m3u"
          FIXED_SOURCE_URL1="https://pastecode.dev/raw/eq5q34ns/%E5%9B%BA%E5%AE%9A"
          FIXED1_SWITCH="off"
          FIXED_SOURCE_URL2="https://gh-proxy.com/https://raw.githubusercontent.com/develop202/migu_video/refs/heads/main/interface.txt"
          FIXED2_SWITCH="on"
          FIXED_SOURCE_URL3="https://pastecode.dev/raw/xxxx/xxxx"
          FIXED3_SWITCH="off"
          FIXED_SOURCE_URL4="https://pastecode.dev/raw/xxxx/xxxx"
          FIXED4_SWITCH="off"
          EXPIRE_DATETIME="2027-01-01 00:00:00"
          TASK_FLAG="expire_task_done.flag"
          GROUP_NAME="央视直播"
          GROUP_SWITCH="off"
          CURL_OPT="--connect-timeout 5 --max-time 15 --retry 2 --retry-delay 2 -L -s"

          # 设置上海时区
          export TZ=Asia/Shanghai
          NOW_DATETIME=$(date +"%Y-%m-%d %H:%M:%S")

          # 判断主源是否到期
          if [[ "$NOW_DATETIME" > "$EXPIRE_DATETIME" ]]; then
            TARGET_URL="$BACKUP_URL"
            [ ! -f "$TASK_FLAG" ] && touch "$TASK_FLAG"
            LOAD_FIXED_SOURCE="off"
          else
            TARGET_URL="$MAIN_URL"
            rm -f "$TASK_FLAG"
            LOAD_FIXED_SOURCE="on"
          fi

          # 备份并清空目标文件
          cp -f indx.php indx.php.bak 2>/dev/null || true
          > indx.php

          # 附加源1
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED1_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix1 "$FIXED_SOURCE_URL1"
            cat temp_fix1 >> indx.php
            rm -f temp_fix1
          fi

          # 下载主/备用源并处理分组替换
          curl $CURL_OPT -o temp_source "$TARGET_URL"
          if [[ "$GROUP_SWITCH" == "on" ]]; then
            sed "s/group-title=\"[^\"]*\"/group-title=\"${GROUP_NAME}\"/g" temp_source > temp_format
          else
            cp temp_source temp_format
          fi
          cat temp_format >> indx.php

          # 附加源2
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED2_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix2 "$FIXED_SOURCE_URL2"
            cat temp_fix2 >> indx.php
            rm -f temp_fix2
          fi
          # 附加源3
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED3_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix3 "$FIXED_SOURCE_URL3"
            cat temp_fix3 >> indx.php
            rm -f temp_fix3
          fi
          # 附加源4
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED4_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix4 "$FIXED_SOURCE_URL4"
            cat temp_fix4 >> indx.php
            rm -f temp_fix4
          fi

          # 清理临时文件
          rm -f temp_source temp_format temp_fix1 temp_fix2 temp_fix3 temp_fix4 indx.php.bak

      # 步骤3：提交推送更新（GitHub 内置 token 自动鉴权）
      - name: 提交推送变更
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add indx.php
          git commit -m "自动同步：更新 indx.php" || echo "无内容变更，跳过提交"
          git push

      # 步骤4：企业微信通知（无论成功失败都执行）
      - name: 企业微信同步通知
        if: always()
        run: |
          set +e
          WEBHOOK="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=430c0cbc-1b04-4519-a3a4-46e418dff464"
          export TZ=Asia/Shanghai
          RUN_TIME=$(date +"%Y-%m-%d %H:%M:%S")
          EXPIRE_TIME="2027-01-01 00:00:00"
          ADVANCE_REMIND_DAYS=30
          # GitHub 文件原始链接格式：raw.githubusercontent.com/用户名/仓库名/分支名/indx.php
          FILE_LINK="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/indx.php"

          # 判断是否有文件变更
          if git diff --quiet HEAD -- indx.php; then
            CHANGE="本次无内容变更"
          else
            CHANGE="已更新 indx.php 内容"
          fi

          # 计算到期剩余天数
          EXPIRE_TIMESTAMP=$(date -d "$EXPIRE_TIME" +%s)
          NOW_TIMESTAMP=$(date -d "$RUN_TIME" +%s)
          DIFF_DAYS=$(( (EXPIRE_TIMESTAMP - NOW_TIMESTAMP) / 86400 ))

          if [[ $DIFF_DAYS -le 0 ]]; then
            EXPIRE_TIP="到期提示：源已到期，请及时续费"
          elif [[ $DIFF_DAYS -le $ADVANCE_REMIND_DAYS ]]; then
            EXPIRE_TIP="到期提示：距离源到期还有 ${DIFF_DAYS} 天"
          else
            EXPIRE_TIP=""
          fi

          # 拼接消息，转义换行符适配JSON
          RAW_MSG="直播源同步任务报告
====================================
执行时间：$RUN_TIME
运行状态：${{ job.status }}
变更状态：$CHANGE
到期时间：$EXPIRE_TIME
分组名称：央视直播
------------------------------------
同步周期：每30分钟
文件链接：$FILE_LINK
====================================
$EXPIRE_TIP"

          # 失败追加@全员
          if [[ "${{ job.status }}" == "failure" ]]; then
            RAW_MSG="$RAW_MSG
@all"
          fi

          # 将换行替换为 \n 适配json
          ESC_MSG=$(echo "$RAW_MSG" | sed ':a;N;$!ba;s/\n/\\n/g')

          # 发送企业微信webhook
          curl --connect-timeout 10 --max-time 20 \
            -H "Content-Type: application/json;charset=utf-8" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$ESC_MSG\"}}" \
            "$WEBHOOK"
