# 工作流名称：同步内容到 index.php
name: 同步内容到 index.php

# 触发条件：手动触发 + 定时（每30分钟）
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

# 定义作业
jobs:
  sync-file:
    # 使用 GitHub 官方提供的 Ubuntu 运行器
    runs-on: ubuntu-latest

    # 设置权限，允许 GITHUB_TOKEN 推送代码
    permissions:
      contents: write

    steps:
      # 检出仓库（使用 v4 版本）
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # 如果用 GITHUB_TOKEN，无需额外配置；若用自定义 PAT，可添加 token: ${{ secrets.PAT }}

      # 核心同步脚本
      - name: 核心同步脚本
        run: |
          # 变量定义（与原文完全一致）
          BACKUP_URL="https://pastecode.dev/raw/2i9vtj9l/paste1.txt"
          MAIN_URL="https://gh-proxy.org/github.com/ioptu/migu_video/raw/refs/heads/main/migu.m3u"
          FIXED_SOURCE_URL1="https://pastecode.dev/raw/eq5q34ns/%E5%9B%BA%E5%AE%9A"
          FIXED1_SWITCH="off"
          FIXED_SOURCE_URL2="https://pastecode.dev/raw/xxxx/xxxx"
          FIXED2_SWITCH="off"
          FIXED_SOURCE_URL3="https://pastecode.dev/raw/xxxx/xxxx"
          FIXED3_SWITCH="off"
          FIXED_SOURCE_URL4="https://pastecode.dev/raw/xxxx/xxxx"
          FIXED4_SWITCH="off"
          EXPIRE_DATETIME="2026-07-01 00:00:00"
          TASK_FLAG="expire_task_done.flag"
          GROUP_NAME="央视直播"
          GROUP_SWITCH="on"
          CURL_OPT="--connect-timeout 5 --max-time 15 --retry 2 --retry-delay 2 -L -s"

          export TZ=Asia/Shanghai
          NOW_DATETIME=$(date "+%Y-%m-%d %H:%M:%S")

          # 判断是否到期
          if [[ "$NOW_DATETIME" > "$EXPIRE_DATETIME" ]]; then
            TARGET_URL="$BACKUP_URL"
            [ ! -f "$TASK_FLAG" ] && touch "$TASK_FLAG"
            LOAD_FIXED_SOURCE="off"
          else
            TARGET_URL="$MAIN_URL"
            rm -f "$TASK_FLAG"
            LOAD_FIXED_SOURCE="on"
          fi

          # 备份并清空 index.php
          cp -f index.php index.php.bak 2>/dev/null || true
          > index.php

          # 附加源1（启用时）
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED1_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix1 "$FIXED_SOURCE_URL1"
            cat temp_fix1 >> index.php
            rm -f temp_fix1
          fi

          # 下载主源
          curl $CURL_OPT -o temp_source "$TARGET_URL"

          # 分组替换
          if [[ "$GROUP_SWITCH" == "on" ]]; then
            sed "s/group-title=\"[^\"]*\"/group-title=\"${GROUP_NAME}\"/g" temp_source > temp_format
          else
            cp temp_source temp_format
          fi
          cat temp_format >> index.php

          # 附加源2/3/4
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED2_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix2 "$FIXED_SOURCE_URL2"
            cat temp_fix2 >> index.php
            rm -f temp_fix2
          fi
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED3_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix3 "$FIXED_SOURCE_URL3"
            cat temp_fix3 >> index.php
            rm -f temp_fix3
          fi
          if [[ "$LOAD_FIXED_SOURCE" == "on" && "$FIXED4_SWITCH" == "on" ]]; then
            curl $CURL_OPT -o temp_fix4 "$FIXED_SOURCE_URL4"
            cat temp_fix4 >> index.php
            rm -f temp_fix4
          fi

          # 清理临时文件
          rm -f temp_source temp_format temp_fix1 temp_fix2 temp_fix3 temp_fix4 index.php.bak

      # 提交并推送变更（使用 GitHub 内置的 GITHUB_TOKEN）
      - name: 提交推送变更
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.php
          git commit -m "自动同步：更新 index.php" || echo "无变更"
          git push
        # 注意：默认 GITHUB_TOKEN 已自动注入，并具有 contents:write 权限（我们已在开头声明）

      # 企业微信通知（无论成败均执行）
      - name: 企业微信同步通知
        if: always()
        run: |
          set +e
          WEBHOOK="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=b581707c-2415-4b9e-958e-9d0f8fdba1cb"
          export TZ=Asia/Shanghai
          RUN_TIME=$(date "+%Y-%m-%d %H:%M:%S")
          EXPIRE_TIME="2026-07-01 00:00:00"
          ADVANCE_REMIND_DAYS=30
          FILE_LINK="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/index.php"   # 改为 GitHub 原始链接

          if git diff --quiet HEAD -- index.php; then
            CHANGE="本次无内容变更"
          else
            CHANGE="已更新index.php内容"
          fi

          EXPIRE_TIMESTAMP=$(date -d "$EXPIRE_TIME" +%s)
          NOW_TIMESTAMP=$(date -d "$RUN_TIME" +%s)
          DIFF_DAYS=$(( (EXPIRE_TIMESTAMP - NOW_TIMESTAMP) / 86400 ))

          if [[ $DIFF_DAYS -le 0 ]]; then
            EXPIRE_TIP="到期提示：源已到期，请及时续费"
          elif [[ $DIFF_DAYS -le $ADVANCE_REMIND_DAYS ]]; then
            EXPIRE_TIP="到期提示：距离源到期还有 ${DIFF_DAYS} 天"
          else
            EXPIRE_TIP=""
          fi

          MSG="直播源同步任务报告\n====================================\n执行时间：$RUN_TIME\n运行状态：${{ job.status }}\n变更状态：$CHANGE\n到期时间：$EXPIRE_TIME\n分组名称：央视直播\n------------------------------------\n同步周期：每30分钟\n文件链接：$FILE_LINK\n====================================\n$EXPIRE_TIP"

          if [[ "${{ job.status }}" == "failure" ]]; then
            MSG="$MSG\n@all"
          fi

          curl --connect-timeout 10 --max-time 20 -H "Content-Type: application/json;charset=utf-8" -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MSG\"}}" "$WEBHOOK"
